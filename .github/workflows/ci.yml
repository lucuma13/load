name: CI

on:
  push:
  pull_request:

jobs:
  bats-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats-core
        run: brew install bats-core
      - name: Syntax check
        run: make check
      - name: Run tests
        run: make test

