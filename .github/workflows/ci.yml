---
name: CI
"on":
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  # Workflow self-audit: YAML validity, GitHub workflow schema, and a security
  # audit of the workflows themselves (zizmor). Catches CI mistakes before they
  # fail mysteriously elsewhere.
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Lint YAML (yamllint)
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c # v3.1.1
        with:
          config_data: "{extends: default, rules: {line-length: {max: 120, level: warning}, comments: {min-spaces-from-content: 1}, document-start: disable}}"
      - name: Validate GitHub workflow schemas
        uses: dsanders11/json-schema-validate-action@eddf079f55830cc9a916a3c512ba9086240d2fea # v2.0.0
        with:
          schema: https://json.schemastore.org/github-workflow.json
          files: .github/workflows/**.yml
      - name: Audit CI workflows (zizmor)
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false
  # Test & Lint (macOS side)
  macos-bats:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26.3
          cache: npm
      # bats-support is pulled from its official git repo; npm records that
      # source as ssh:// in the lockfile. CI has no GitHub SSH keys, so rewrite
      # to https before installing.
      - name: Fetch github git deps over https
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
      - run: npm ci
      - name: Syntax check
        run: make check
      - name: Lint (ShellCheck)
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
      - run: npm run test:ci
  # Test & Lint (Windows side)
  windows-pester:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Lint (PSScriptAnalyzer)
        shell: pwsh
        run: |
          $r  = Invoke-ScriptAnalyzer -Path src   -Recurse -Settings ./PSScriptAnalyzerSettings.psd1 -Severity Information,Warning,Error
          $r += Invoke-ScriptAnalyzer -Path tests -Recurse -Settings ./PSScriptAnalyzerSettings.psd1 -Severity Information,Warning,Error -ExcludeRule PSUseDeclaredVarsMoreThanAssignments
          if ($r) { $r | Format-Table RuleName,Severity,ScriptName,Line,Message -AutoSize -Wrap; throw "PSScriptAnalyzer found $($r.Count) issue(s)" }
      - name: Run Pester
        shell: pwsh
        run: Invoke-Pester -Path tests -Output Detailed -CI
