name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  macos-bats:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 26.3
          cache: npm

      # bats-support is pulled from its official git repo; npm records that
      # source as ssh:// in the lockfile. CI has no GitHub SSH keys, so rewrite
      # to https before installing.
      - name: Fetch github git deps over https
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - run: npm ci

      - name: Syntax check
        run: make check

      - run: npm run test:ci

  windows-pester:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Lint (PSScriptAnalyzer)
        shell: pwsh
        run: |
          $r  = Invoke-ScriptAnalyzer -Path src   -Recurse -Settings ./PSScriptAnalyzerSettings.psd1 -Severity Warning,Error
          $r += Invoke-ScriptAnalyzer -Path tests -Recurse -Settings ./PSScriptAnalyzerSettings.psd1 -Severity Warning,Error -ExcludeRule PSUseDeclaredVarsMoreThanAssignments
          if ($r) { $r | Format-Table RuleName,Severity,ScriptName,Line,Message -AutoSize -Wrap; throw "PSScriptAnalyzer found $($r.Count) issue(s)" }

      - name: Run Pester
        shell: pwsh
        run: Invoke-Pester -Path tests -Output Detailed -CI
